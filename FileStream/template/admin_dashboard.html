<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ dashboard_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg: #05070c;
            --bg-soft: #0b1119;
            --panel: rgba(11, 17, 25, 0.88);
            --panel-strong: rgba(13, 21, 31, 0.96);
            --line: rgba(255, 255, 255, 0.08);
            --line-strong: rgba(255, 255, 255, 0.14);
            --text: #f6f8fb;
            --muted: #95a5b6;
            --accent: #ef4f3d;
            --accent-soft: rgba(239, 79, 61, 0.18);
            --success: #75e2ad;
            --danger: #ff8d81;
            --shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Manrope", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(239, 79, 61, 0.16), transparent 20%),
                radial-gradient(circle at top right, rgba(55, 110, 255, 0.14), transparent 18%),
                linear-gradient(180deg, #05070c 0%, #08111a 32%, #05080d 100%);
        }

        a { color: inherit; text-decoration: none; }
        button, input, select, textarea { font: inherit; }

        .shell {
            width: min(1740px, calc(100% - 40px));
            margin: 0 auto;
            padding: 24px 0 48px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-left: auto;
            margin-right: auto;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
            color: var(--muted);
            font-weight: 700;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
            cursor: pointer;
        }

        .nav-link:hover {
            transform: translateY(-1px);
            border-color: var(--line-strong);
            color: var(--text);
            background: rgba(255, 255, 255, 0.06);
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, rgba(239, 79, 61, 0.92), rgba(255, 154, 84, 0.92));
            color: #fff;
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            letter-spacing: 0.04em;
            box-shadow: 0 18px 34px rgba(239, 79, 61, 0.24);
        }

        .brand-copy small,
        .eyebrow,
        .section-kicker {
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: #ffb8a6;
            font-weight: 700;
            font-size: 0.72rem;
        }

        .brand-copy strong {
            display: block;
            margin-top: 4px;
            font-size: 1rem;
            letter-spacing: -0.02em;
        }

        .nav-actions,
        .top-actions,
        .card-actions,
        .selection-actions,
        .toolbar-actions,
        .modal-actions,
        .file-actions,
        .pagination {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pill,
        .ghost,
        .button,
        .chip,
        .tiny {
            border-radius: 999px;
            border: 1px solid var(--line);
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .pill,
        .ghost,
        .button,
        .tiny {
            padding: 12px 18px;
            cursor: pointer;
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
        }

        .button {
            border: 0;
            color: #fff8f5;
            background: linear-gradient(135deg, var(--accent), #ff9353);
            box-shadow: 0 16px 40px rgba(239, 79, 61, 0.22);
            font-weight: 800;
        }

        .pill:hover,
        .ghost:hover,
        .button:hover,
        .media-card:hover,
        .tiny:hover {
            transform: translateY(-1px);
        }

        .ghost {
            background: rgba(255, 255, 255, 0.03);
        }

        .tiny {
            padding: 8px 12px;
            font-size: 0.84rem;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.82rem;
            color: var(--muted);
        }

        .panel {
            border: 1px solid var(--line);
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .muted {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .home-summary {
            margin-top: 10px;
            padding: 18px 20px;
            border-radius: 28px;
            display: grid;
            grid-template-columns: minmax(320px, 0.82fr) minmax(0, 1.18fr);
            gap: 18px;
            align-items: start;
        }

        .home-copy {
            display: grid;
            gap: 14px;
        }

        .home-copy h1 {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(1.7rem, 2.4vw, 2.35rem);
            line-height: 0.96;
            letter-spacing: -0.06em;
            max-width: 11ch;
        }

        .home-chips,
        .home-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .hero-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .home-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .home-box {
            padding: 14px 16px;
            border-radius: 22px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .home-box strong,
        .home-box span {
            display: block;
        }

        .home-box strong {
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.16rem;
            letter-spacing: -0.04em;
        }

        .home-box span {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.5;
        }

        .home-featured {
            display: grid;
            gap: 12px;
            align-content: start;
        }

        .home-featured-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 12px;
            flex-wrap: wrap;
        }

        .home-featured-head strong {
            display: block;
            margin-top: 4px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.2rem;
            letter-spacing: -0.04em;
        }

        .home-featured-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .home-mini-card {
            overflow: hidden;
            border-radius: 24px;
            border: 1px solid var(--line);
            background: rgba(9, 13, 20, 0.92);
            cursor: pointer;
            display: grid;
            grid-template-rows: 180px auto;
            min-height: 100%;
        }

        .home-mini-card:hover {
            border-color: rgba(255, 255, 255, 0.16);
        }

        .home-mini-art {
            position: relative;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(6, 9, 14, 0.32)),
                linear-gradient(135deg, rgba(239, 79, 61, 0.12), rgba(67, 112, 255, 0.12)),
                #101720 center / cover no-repeat;
            border-bottom: 1px solid var(--line);
        }

        .home-mini-art::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(6, 9, 14, 0.06) 0%, rgba(6, 9, 14, 0.10) 50%, rgba(6, 9, 14, 0.46) 100%);
        }

        .home-mini-top {
            position: absolute;
            inset: 10px 10px auto 10px;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 8px;
        }

        .home-mini-copy {
            padding: 14px;
            display: grid;
            gap: 10px;
        }

        .home-mini-copy h3 {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.02rem;
            line-height: 1.08;
            letter-spacing: -0.04em;
        }

        .home-mini-copy p {
            margin: 0;
            color: var(--muted);
            font-size: 0.86rem;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .home-mini-meta {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 10px;
        }

        .home-mini-meta small {
            display: block;
            color: var(--muted);
            line-height: 1.45;
        }

        .stats-strip {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-top: 20px;
        }

        .search-surface {
            margin-top: 20px;
            padding: 20px 22px;
            border-radius: 28px;
        }

        .surface-top {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
        }

        .surface-stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stat-card {
            padding: 18px 20px;
            border-radius: 24px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.035);
        }

        .stat-card span {
            display: block;
            margin-top: 8px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 2rem;
            letter-spacing: -0.04em;
        }

        .control-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(340px, 0.8fr) minmax(320px, 0.8fr);
            gap: 16px;
            margin-top: 20px;
        }

        .control-card {
            padding: 22px;
            border-radius: 28px;
        }

        .control-card h2,
        .section-head h2,
        .modal-content h2 {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.5rem;
            letter-spacing: -0.04em;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field label {
            font-size: 0.9rem;
            color: var(--muted);
        }

        input,
        select,
        textarea {
            width: 100%;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            padding: 14px 16px;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(239, 79, 61, 0.42);
            box-shadow: 0 0 0 4px rgba(239, 79, 61, 0.08);
        }

        textarea {
            min-height: 104px;
            resize: vertical;
        }

        .search-form {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 220px 160px 140px 180px auto auto;
            gap: 12px;
            margin-top: 18px;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .view-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
            color: var(--muted);
            font-weight: 700;
        }

        .view-pill.is-active {
            color: var(--text);
            border-color: rgba(239, 79, 61, 0.38);
            background: rgba(239, 79, 61, 0.12);
        }

        .toolbar-stack {
            display: grid;
            gap: 14px;
            margin-top: 16px;
        }

        .inline-panel {
            padding: 16px;
            border-radius: 22px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.025);
        }

        .scan-panel {
            display: grid;
            gap: 14px;
        }

        .scan-progress-track {
            position: relative;
            overflow: hidden;
            height: 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--line);
        }

        .scan-progress-fill {
            position: relative;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), #ff9353, #ffc082);
            box-shadow: 0 10px 30px rgba(239, 79, 61, 0.22);
            transition: width 0.35s ease;
        }

        .scan-progress-fill.is-live {
            min-width: 26%;
            background-size: 200% 100%;
            animation: scanPulse 1.4s linear infinite;
        }

        .scan-progress-fill.is-live::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
            transform: translateX(-100%);
            animation: scanSweep 1.6s ease-in-out infinite;
        }

        .scan-meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .scan-meta strong {
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.05rem;
            letter-spacing: -0.03em;
        }

        .scan-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .scan-stat {
            padding: 14px;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .scan-stat strong {
            display: block;
            margin-top: 6px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.18rem;
            letter-spacing: -0.04em;
        }

        .scan-last-file {
            padding: 12px 14px;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .scan-last-file strong,
        .scan-last-file span {
            display: block;
        }

        .scan-last-file span {
            margin-top: 6px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @keyframes scanPulse {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes scanSweep {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(240%); }
        }

        .status-line {
            min-height: 22px;
            color: var(--muted);
            font-size: 0.94rem;
        }

        .status-line.is-success { color: var(--success); }
        .status-line.is-error { color: var(--danger); }

        .sources-list {
            display: grid;
            gap: 10px;
            margin-top: 12px;
            max-height: 250px;
            overflow: auto;
            padding-right: 4px;
        }

        .admin-users-list {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .admin-user-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 14px 16px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .admin-user-copy strong,
        .admin-user-copy span {
            display: block;
        }

        .admin-user-copy span {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .source-row {
            padding: 14px 16px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .source-row strong {
            display: block;
            margin-bottom: 6px;
        }

        .library-section {
            margin-top: 28px;
        }

        .workspace-section {
            margin-top: 26px;
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .workspace-card {
            border-radius: 28px;
            overflow: hidden;
        }

        .workspace-card summary {
            list-style: none;
            cursor: pointer;
            padding: 20px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .workspace-card summary::-webkit-details-marker {
            display: none;
        }

        .workspace-body {
            padding: 0 22px 22px;
        }

        .workspace-card[open] summary {
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.02);
        }

        .raw-shelf {
            margin-top: 22px;
            border-radius: 28px;
            overflow: hidden;
        }

        .raw-shelf summary {
            list-style: none;
            cursor: pointer;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .raw-shelf summary::-webkit-details-marker {
            display: none;
        }

        .raw-shelf-body {
            padding: 0 18px 18px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            margin-bottom: 18px;
        }

        .section-copy {
            max-width: 860px;
        }

        .section-copy p {
            margin-top: 8px;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 16px;
        }

        .file-browser {
            display: grid;
            gap: 12px;
        }

        .browser-row {
            display: grid;
            grid-template-columns: auto minmax(0, 1.6fr) minmax(0, 0.9fr) auto;
            gap: 16px;
            align-items: center;
            padding: 16px 18px;
            border-radius: 24px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .browser-main {
            min-width: 0;
        }

        .browser-main strong,
        .browser-meta strong {
            display: block;
        }

        .browser-main strong {
            font-size: 1rem;
            line-height: 1.45;
            word-break: break-word;
        }

        .browser-main span,
        .browser-meta span {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .browser-meta {
            min-width: 0;
        }

        .browser-actions {
            display: flex;
            align-items: center;
            justify-content: end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .browser-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .selection-cart {
            margin-top: 18px;
            border-radius: 28px;
            overflow: hidden;
        }

        .selection-cart summary {
            list-style: none;
            cursor: pointer;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .selection-cart summary::-webkit-details-marker {
            display: none;
        }

        .selection-cart-body {
            padding: 0 18px 18px;
            display: grid;
            gap: 10px;
        }

        .cart-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 14px 16px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .cart-copy {
            min-width: 0;
        }

        .cart-copy strong,
        .cart-copy span {
            display: block;
        }

        .cart-copy span {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cart-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .confidence-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .confidence-chip.strong {
            color: #fef3ee;
            border-color: rgba(117, 226, 173, 0.25);
            background: rgba(117, 226, 173, 0.12);
        }

        .confidence-chip.medium {
            color: #fff4dd;
            border-color: rgba(255, 192, 130, 0.24);
            background: rgba(255, 192, 130, 0.12);
        }

        .confidence-chip.filename {
            color: #d8e5f4;
            border-color: rgba(121, 171, 230, 0.22);
            background: rgba(121, 171, 230, 0.10);
        }

        .media-card {
            overflow: hidden;
            border-radius: 28px;
            border: 1px solid var(--line);
            background: rgba(9, 13, 20, 0.9);
            box-shadow: var(--shadow);
            cursor: pointer;
            display: grid;
            grid-template-rows: 235px auto;
        }

        .media-card:hover {
            border-color: rgba(255, 255, 255, 0.18);
        }

        .media-art {
            position: relative;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(6, 9, 14, 0.42)),
                linear-gradient(135deg, rgba(239, 79, 61, 0.18), rgba(67, 112, 255, 0.14)),
                #111925 center / cover no-repeat;
            border-bottom: 1px solid var(--line);
        }

        .media-art::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(6, 9, 14, 0.08) 0%, rgba(6, 9, 14, 0.18) 52%, rgba(6, 9, 14, 0.54) 100%);
        }

        .media-card-top {
            position: absolute;
            inset: 12px 12px auto 12px;
            display: flex;
            justify-content: space-between;
            align-items: start;
            z-index: 1;
        }

        .media-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .media-content {
            padding: 15px;
            display: grid;
            gap: 10px;
        }

        .media-title {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.08rem;
            line-height: 1.08;
            letter-spacing: -0.04em;
        }

        .media-description {
            color: var(--muted);
            font-size: 0.87rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .media-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 10px;
        }

        .media-footer small {
            display: block;
            color: var(--muted);
            line-height: 1.5;
        }

        .media-footer-copy {
            min-width: 0;
        }

        .card-actions {
            opacity: 1;
            transform: none;
            transition: opacity 0.18s ease, transform 0.18s ease, background 0.18s ease;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .media-card:hover .card-actions,
        .media-card:focus-within .card-actions {
            opacity: 1;
            transform: translateY(0);
        }

        .empty-state,
        .selection-bar,
        .modal-card {
            border: 1px solid var(--line);
            background: var(--panel-strong);
            box-shadow: var(--shadow);
        }

        .empty-state {
            padding: 30px;
            border-radius: 30px;
            color: var(--muted);
        }

        .pagination {
            justify-content: space-between;
            margin-top: 22px;
            padding: 18px 22px;
            border-radius: 28px;
        }

        .selection-bar {
            position: sticky;
            bottom: 18px;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin-top: 18px;
            padding: 18px 20px;
            border-radius: 24px;
        }

        .selection-summary strong {
            display: block;
            font-size: 1rem;
        }

        .selection-summary p {
            margin-top: 6px;
        }

        .modal-shell {
            position: fixed;
            inset: 0;
            z-index: 60;
            background: rgba(2, 4, 8, 0.78);
            backdrop-filter: blur(10px);
            padding: 18px;
            overflow: auto;

        .modal-card {
            width: min(1280px, 100%);
            margin: 0 auto;
            border-radius: 34px;

        }

        .modal-hero {
            position: relative;
            min-height: 360px;
            background:
                linear-gradient(90deg, rgba(5, 7, 12, 0.96) 0%, rgba(5, 7, 12, 0.72) 48%, rgba(5, 7, 12, 0.32) 100%),

        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 1;
        }

        .modal-hero-inner {
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 24px;
            padding: 32px;
            align-items: end;
            min-height: 360px;
        }

        .modal-poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(239, 79, 61, 0.18), rgba(12, 18, 28, 0.16)), #141c25 center / cover no-repeat;
            border: 1px solid var(--line);
        }

        .modal-content {
            padding: 22px 28px 30px;
        }

        .files-grid {
            display: grid;
            gap: 12px;
            margin-top: 18px;
        }

        .modal-toolbar {
            display: grid;
            gap: 14px;
            margin-top: 18px;
            margin-bottom: 10px;

        .filter-panel {
            display: grid;
            gap: 12px;

        .filter-chips {

            flex-wrap: wrap;

        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
            color: var(--muted);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;

        .filter-chip:hover {
            transform: translateY(-1px);
            border-color: var(--line-strong);
            color: var(--text);

        .filter-chip.is-active {
            color: var(--text);
            border-color: rgba(239, 79, 61, 0.38);
            background: rgba(239, 79, 61, 0.14);
        }

        .copy-field {
            width: 100%;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            padding: 12px 14px;
            font-size: 0.94rem;
        }

        .fix-match-panel {
            margin-top: 16px;
            padding: 16px;
            border-radius: 22px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
            display: grid;
            gap: 12px;
        }

        .match-results {
            display: grid;
            gap: 10px;
        }

        .match-result {
            padding: 14px 16px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .match-result strong,
        .match-result span {
            display: block;
        }

        .match-result span {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .file-row {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
            padding: 14px 16px;
            border-radius: 22px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .file-copy {
            min-width: 0;
        }

        .file-copy strong {
            display: block;
            font-size: 0.98rem;
        }

        .file-copy span {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-actions {
            justify-content: end;
        }

        @media (max-width: 1320px) {
            .control-grid { grid-template-columns: 1fr; }
            .search-form { grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto auto; }
            .home-summary { grid-template-columns: 1fr; }
            .home-featured-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .workspace-grid { grid-template-columns: 1fr; }

        @media (max-width: 920px) {
            .shell { width: min(100%, calc(100% - 20px)); }
            .stats-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .search-form { grid-template-columns: 1fr; }
            .media-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
            .modal-hero-inner { grid-template-columns: 1fr; }
            .selection-bar,
            .section-head,
            .nav,
            .surface-top { flex-direction: column; align-items: stretch; }
            .nav-center { margin: 0; }
            .browser-row { grid-template-columns: auto minmax(0, 1fr); }
            .browser-meta,
            .browser-actions { grid-column: 1 / -1; justify-content: start; }

        @media (max-width: 700px) {
            .home-summary,
            .control-card,
            .modal-content { padding-left: 18px; padding-right: 18px; }
            .media-grid { grid-template-columns: 1fr 1fr; }
            .home-grid,
            .home-featured-grid { grid-template-columns: 1fr; }
            .file-row { grid-template-columns: auto minmax(0, 1fr); }
            .file-actions { grid-column: 1 / -1; justify-content: start; }
            .scan-stats { grid-template-columns: 1fr; }
            .media-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        window.__ADMIN_DATA__ = {{ initial_data | tojson }};
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        {% raw %}
        const { useEffect, useState } = React;

        const initialData = window.__ADMIN_DATA__ || {};
        const STORAGE_KEY = "filestream-selected-files";

        function readSelection() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            } catch (error) {
                return [];
            }
        }

        function writeSelection(values) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(new Set(values))));
        }

        function formatEpisodeLabel(file) {
            if (file.season && file.episode) {
                return `S${String(file.season).padStart(2, "0")}E${String(file.episode).padStart(2, "0")}`;
            }
            return "Video File";
        }

        function describeScanStatus(scanStatus) {
            if (!scanStatus || !scanStatus.chat_id) {
                return "No source scan has been started yet.";
            }
            const parts = [
                scanStatus.mode === "sync" ? (scanStatus.running ? "syncing new posts" : "new-post sync idle") : (scanStatus.running ? "scan running" : "scan idle"),
                `chat ${scanStatus.chat_id}`,
                `${scanStatus.imported_files} imported`,
                `${scanStatus.duplicate_files} duplicates`,
                `${scanStatus.matched_videos} matched`,
            ];
            if (scanStatus.last_file_name) {
                parts.push(`last ${scanStatus.last_file_name}`);
            }
            if (scanStatus.error) {
                parts.push(`error ${scanStatus.error}`);
            }
            return parts.join(" · ");
        }

        function formatNumber(value) {
            return new Intl.NumberFormat().format(Number(value) || 0);
        }

        function formatDuration(totalSeconds) {
            const seconds = Math.max(0, Number(totalSeconds) || 0);
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const remainder = seconds % 60;
            if (hours) {
                return `${hours}h ${String(minutes).padStart(2, "0")}m`;
            }
            if (minutes) {
                return `${minutes}m ${String(remainder).padStart(2, "0")}s`;
            }
            return `${remainder}s`;
        }

        function getScanProgress(scanStatus) {
            if (!scanStatus || !scanStatus.chat_id) {
                return {
                    percent: 0,
                    indeterminate: false,
                    headline: "No source scan started yet",
                    detail: "Add a source chat ID and start a scan.",
                };
            }

            const totalMessages = Number(scanStatus.total_messages) || 0;
            const scannedMessages = Number(scanStatus.scanned_messages) || 0;
            const elapsed = formatDuration(scanStatus.elapsed_seconds);
            const rate = scanStatus.messages_per_second ? `${scanStatus.messages_per_second}/s` : "warming up";

            if (scanStatus.running) {
                if (totalMessages > 0) {
                    const percent = Math.max(2, Math.min(100, Number(scanStatus.progress_percent) || 0));
                    return {
                        percent,
                        indeterminate: false,
                        headline: scanStatus.mode === "sync" ? `${percent.toFixed(1)}% of new posts checked` : `${percent.toFixed(1)}% scanned`,
                        detail: `${formatNumber(scannedMessages)} of ${formatNumber(totalMessages)} messages · ${elapsed} · ${rate}`,
                    };
                }
                return {
                    percent: 72,
                    indeterminate: true,
                    headline: scanStatus.mode === "sync" ? `Syncing ${formatNumber(scannedMessages)} new posts` : `Scanning ${formatNumber(scannedMessages)} messages`,
                    detail: `${elapsed} · ${rate}`,
                };
            }

            if (scanStatus.error) {
                return {
                    percent: 100,
                    indeterminate: false,
                    headline: "Scan stopped with an error",
                    detail: scanStatus.error,
                };
            }

            return {
                percent: scanStatus.chat_id ? 100 : 0,
                indeterminate: false,
                headline: "Scan finished",
                detail: `${formatNumber(scannedMessages)} messages checked in ${elapsed}`,
            };
        }

        function seasonCount(files) {
            const seasons = new Set(files.filter((file) => file.season).map((file) => file.season));
            return seasons.size;
        }

        function formatParsedMeta(file) {
            if (file.season && file.episode) {
                return `S${String(file.season).padStart(2, "0")}E${String(file.episode).padStart(2, "0")} · ${file.media_kind?.toUpperCase?.() || "VIDEO"}`;
            }
            if (file.season) {
                return `Season ${file.season} · ${file.media_kind?.toUpperCase?.() || "VIDEO"}`;
            }
            return file.media_kind?.toUpperCase?.() || "VIDEO";
        }

        function formatConfidence(confidence) {
            if (confidence === "strong") {
                return "Strong Match";
            }
            if (confidence === "medium") {
                return "Matched";
            }
            return "Raw";
        }

        function formatCardBadge(group) {
            if (group?.locked) {
                return formatLockMode(group.lock_mode, group.locked);
            }
            if (group?.confidence === "strong") {
                return "Strong Match";
            }
            if (group?.confidence === "medium") {
                return "Matched";
            }
            return "Raw";
        }

        function formatLockMode(lockMode, locked) {
            if (!locked) {
                return "Auto Match";
            }
            if (lockMode === "filename") {
                return "Filename Locked";
            }
            return "TMDb Locked";
        }

        function detectQualityTag(fileName) {
            const value = String(fileName || "").toLowerCase();
            if (/(^|[^a-z0-9])(2160p|4k)(?=[^a-z0-9]|$)/.test(value)) {
                return "2160p";
            }
            if (/(^|[^a-z0-9])1440p(?=[^a-z0-9]|$)/.test(value)) {
                return "1440p";
            }
            if (/(^|[^a-z0-9])1080p?(?=[^a-z0-9]|$)/.test(value)) {
                return "1080p";
            }
            if (/(^|[^a-z0-9])720p?(?=[^a-z0-9]|$)/.test(value)) {
                return "720p";
            }
            if (/(^|[^a-z0-9])480p?(?=[^a-z0-9]|$)/.test(value)) {
                return "480p";
            }
            return "Other";
        }

        function parseSizeBytes(sizeValue) {
            const value = String(sizeValue || "").trim().toLowerCase();
            const match = value.match(/^([\d.]+)\s*(kib|kb|mib|mb|gib|gb|tib|tb)$/i);
            if (!match) {
                return 0;
            }
            const amount = Number(match[1]);
            const unit = match[2].toLowerCase();
            const factors = {
                kib: 1024,
                kb: 1000,
                mib: 1024 ** 2,
                mb: 1000 ** 2,
                gib: 1024 ** 3,
                gb: 1000 ** 3,
                tib: 1024 ** 4,
                tb: 1000 ** 4,
            };
            return amount * (factors[unit] || 1);
        }

        function compareEpisodeOrder(left, right) {
            const leftSeason = Number(left.season || 0);
            const rightSeason = Number(right.season || 0);
            if (leftSeason !== rightSeason) {
                return leftSeason - rightSeason;
            }
            const leftEpisode = Number(left.episode || 0);
            const rightEpisode = Number(right.episode || 0);
            if (leftEpisode !== rightEpisode) {
                return leftEpisode - rightEpisode;
            }
            return String(left.name || "").localeCompare(String(right.name || ""), undefined, { sensitivity: "base" });
        }

        function sortFilesForModal(files, sortMode) {
            const next = [...files];
            if (sortMode === "size_desc") {
                next.sort((left, right) => parseSizeBytes(right.size) - parseSizeBytes(left.size) || compareEpisodeOrder(left, right));
                return next;
            }
            if (sortMode === "size_asc") {
                next.sort((left, right) => parseSizeBytes(left.size) - parseSizeBytes(right.size) || compareEpisodeOrder(left, right));
                return next;
            }
            if (sortMode === "name") {
                next.sort((left, right) => String(left.name || "").localeCompare(String(right.name || ""), undefined, { sensitivity: "base" }));
                return next;
            }
            next.sort(compareEpisodeOrder);
            return next;
        }

        function sortBucketsForModal(buckets, sortMode) {
            const next = [...buckets];
            if (sortMode === "size_desc") {
                next.sort((left, right) => {
                    const leftMax = Math.max(...left.files.map((file) => parseSizeBytes(file.size)), 0);
                    const rightMax = Math.max(...right.files.map((file) => parseSizeBytes(file.size)), 0);
                    return rightMax - leftMax || String(left.label || "").localeCompare(String(right.label || ""), undefined, { sensitivity: "base" });
                });
                return next;
            }
            if (sortMode === "size_asc") {
                next.sort((left, right) => {
                    const leftMin = Math.min(...left.files.map((file) => parseSizeBytes(file.size)), Number.MAX_SAFE_INTEGER);
                    const rightMin = Math.min(...right.files.map((file) => parseSizeBytes(file.size)), Number.MAX_SAFE_INTEGER);
                    return leftMin - rightMin || String(left.label || "").localeCompare(String(right.label || ""), undefined, { sensitivity: "base" });
                });
                return next;
            }
            if (sortMode === "name") {
                next.sort((left, right) => String(left.label || "").localeCompare(String(right.label || ""), undefined, { sensitivity: "base" }));
                return next;
            }
            next.sort((left, right) => compareEpisodeOrder(left.files[0] || {}, right.files[0] || {}));
            return next;
        }

        function extractReleaseTags(fileName) {
            const value = String(fileName || "").toLowerCase();
            const tags = [];

            if (/bluray|bdrip|bdremux/.test(value)) {
                tags.push("BluRay");
            } else if (/web[-_. ]?dl/.test(value)) {
                tags.push("WEB-DL");
            } else if (/webrip/.test(value)) {
                tags.push("WEBRip");
            } else if (/\bnf\b|netflix/.test(value)) {
                tags.push("NF");
            }

            if (/av1/.test(value)) {
                tags.push("AV1");
            } else if (/x265|hevc|h265/.test(value)) {
                tags.push("HEVC");
            } else if (/x264|h264/.test(value)) {
                tags.push("x264");
            }

            if (/atmos/.test(value)) {
                tags.push("Atmos");
            } else if (/ddp5[._ ]?1|ddp|dd\+/.test(value)) {
                tags.push("DDP");
            } else if (/aac/.test(value)) {
                tags.push("AAC");
            } else if (/dts/.test(value)) {
                tags.push("DTS");
            }

            return tags.slice(0, 3);
        }

        function buildVariantBuckets(files) {
            const buckets = [];
            const lookup = new Map();
            files.forEach((file) => {
                const key = file.season && file.episode
                    ? `s${file.season}e${file.episode}`
                    : file.name;
                if (!lookup.has(key)) {
                    lookup.set(key, {
                        key,
                        label: formatEpisodeLabel(file),
                        files: [],
                    });
                    buckets.push(lookup.get(key));
                }
                lookup.get(key).files.push(file);
            });
            return buckets;
        }

        function jumpToSection(sectionId) {
            const node = document.getElementById(sectionId);
            if (!node) {
                return;
            }
            if (node.tagName === "DETAILS") {
                node.open = true;
            }
            node.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function App() {
            const [selection, setSelection] = useState([]);
            const [playlistTitle, setPlaylistTitle] = useState("");
            const [scanChatId, setScanChatId] = useState("");
            const [playlistUrl, setPlaylistUrl] = useState("");
            const [telegramBundleUrl, setTelegramBundleUrl] = useState("");
            const [status, setStatus] = useState({ message: "", mode: "" });
            const [scanStatus, setScanStatus] = useState(initialData.scan_status);
            const [activeGroupKey, setActiveGroupKey] = useState("");
            const [fixMatchOpen, setFixMatchOpen] = useState(false);
            const [fixMatchQuery, setFixMatchQuery] = useState("");
            const [fixMatchTmdbId, setFixMatchTmdbId] = useState("");
            const [fixMatchResults, setFixMatchResults] = useState([]);
            const [fixMatchLoading, setFixMatchLoading] = useState(false);
            const [activeQualityFilter, setActiveQualityFilter] = useState("all");
            const [activeVariantSort, setActiveVariantSort] = useState("episode");
            const [adminUsers, setAdminUsers] = useState(initialData.admin_users || []);
            const [newAdminUsername, setNewAdminUsername] = useState("");
            const [newAdminPassword, setNewAdminPassword] = useState("");

            useEffect(() => {
                setSelection(readSelection());
            }, []);

            useEffect(() => {
                writeSelection(selection);
            }, [selection]);

            useEffect(() => {
                if (!scanStatus || !scanStatus.running) {
                    return;
                }

                const timer = setInterval(async () => {
                    try {
                        const response = await fetch(initialData.scan_status_endpoint);
                        const payload = await response.json();
                        if (payload.ok) {
                            setScanStatus(payload.scan);
                        }
                    } catch (error) {
                    }
                }, 1500);

                return () => clearInterval(timer);
            }, [scanStatus]);

            const groups = initialData.groups || [];
            const fileRows = initialData.file_rows || [];
            const isExplorerView = initialData.view_mode === "files";
            const strongMatchGroups = groups.filter((group) => (group.confidence || "").toLowerCase() === "strong");
            const metaMatchGroups = groups.filter((group) => (group.confidence || "").toLowerCase() === "medium");
            const filenameGroups = groups.filter((group) => !["strong", "medium"].includes((group.confidence || "").toLowerCase()));
            const polishedGroups = groups.filter((group) => group.poster_url || group.backdrop_url || group.overview);
            const rawGroups = groups.filter((group) => !polishedGroups.includes(group));
            const displayGroups = polishedGroups.length ? polishedGroups : groups;
            const homepageLeadGroups = strongMatchGroups.length
                ? strongMatchGroups
                : (metaMatchGroups.length ? metaMatchGroups : displayGroups);
            const homeFeaturedGroups = (() => {
                const rankMap = { strong: 3, medium: 2, filename: 1 };
                const candidates = (displayGroups.length ? displayGroups : groups).slice().sort((left, right) => {
                    const leftRank = rankMap[(left.confidence || "filename").toLowerCase()] || 0;
                    const rightRank = rankMap[(right.confidence || "filename").toLowerCase()] || 0;
                    if (leftRank !== rightRank) {
                        return rightRank - leftRank;
                    }
                    if (Number(left.locked) !== Number(right.locked)) {
                        return Number(right.locked) - Number(left.locked);
                    }
                    if ((right.poster_url || right.backdrop_url) !== (left.poster_url || left.backdrop_url)) {
                        return Number(Boolean(right.poster_url || right.backdrop_url)) - Number(Boolean(left.poster_url || left.backdrop_url));
                    }
                    return (right.count || 0) - (left.count || 0);
                });
                return candidates.slice(0, 4);
            })();
            const primaryWallGroups = homepageLeadGroups;
            const secondaryMetaGroups = strongMatchGroups.length ? metaMatchGroups : [];
            const secondaryFilenameGroups = filenameGroups.length ? filenameGroups : rawGroups;
            const activeGroup = isExplorerView ? null : (groups.find((group) => group.key === activeGroupKey) || null);
            const visibleLinks = initialData.visible_links_text || "";
            const activeSelectedIds = activeGroup
                ? activeGroup.files.filter((file) => selection.includes(file.id)).map((file) => file.id)
                : [];
            const activeSelectionCount = activeSelectedIds.length;
            const scanProgress = getScanProgress(scanStatus);
            const visibleIds = isExplorerView
                ? fileRows.map((file) => file.id)
                : primaryWallGroups.flatMap((group) => group.files.map((file) => file.id));
            const fileLookup = {};
            fileRows.forEach((file) => {
                fileLookup[file.id] = {
                    id: file.id,
                    label: file.name,
                    sublabel: `${file.source_title} · ${file.size}`,
                    confidence: file.confidence || "filename",
                };
            });
            groups.forEach((group) => {
                group.files.forEach((file) => {
                    fileLookup[file.id] = {
                        id: file.id,
                        label: file.name,
                        sublabel: `${group.display_title} · ${file.size}`,
                        confidence: group.confidence || "filename",
                    };
                });
            });
            const visibleSelectionItems = selection.map((id) => fileLookup[id]).filter(Boolean);
            const hiddenSelectionCount = selection.length - visibleSelectionItems.length;
            const activeQualityOptions = activeGroup
                ? Array.from(new Set(activeGroup.files.map((file) => detectQualityTag(file.name)))).sort((left, right) => {
                    const order = ["2160p", "1440p", "1080p", "720p", "480p", "Other"];
                    return order.indexOf(left) - order.indexOf(right);
                })
                : [];
            const activeFilteredFiles = activeGroup
                ? activeGroup.files.filter((file) => activeQualityFilter === "all" || detectQualityTag(file.name) === activeQualityFilter)
                : [];
            const activeBuckets = activeGroup
                ? sortBucketsForModal(buildVariantBuckets(activeFilteredFiles), activeVariantSort).map((bucket) => ({
                    ...bucket,
                    files: sortFilesForModal(bucket.files, activeVariantSort),
                }))
                : [];
            const activeFilteredIds = activeFilteredFiles.map((file) => file.id);
            const activeFilteredSelectedIds = activeFilteredFiles
                .filter((file) => selection.includes(file.id))
                .map((file) => file.id);
            const activeFilteredSelectionCount = activeFilteredFiles.filter((file) => selection.includes(file.id)).length;

            useEffect(() => {
                setFixMatchOpen(false);
                setFixMatchResults([]);
                setFixMatchLoading(false);
                setFixMatchQuery(activeGroup ? activeGroup.display_title : "");
                setFixMatchTmdbId(activeGroup && activeGroup.tmdb_id ? String(activeGroup.tmdb_id) : "");
                setActiveQualityFilter("all");
                setActiveVariantSort("episode");
            }, [activeGroupKey]);

            function copyTextFallback(value) {
                const input = document.createElement("textarea");
                input.value = value;
                input.setAttribute("readonly", "");
                input.style.position = "fixed";
                input.style.opacity = "0";
                input.style.pointerEvents = "none";
                document.body.appendChild(input);
                input.focus();
                input.select();
                input.setSelectionRange(0, input.value.length);
                let copied = false;
                try {
                    copied = document.execCommand("copy");
                } catch (error) {
                    copied = false;
                }
                document.body.removeChild(input);
                return copied;
            }

            function hasSelected(id) {
                return selection.includes(id);
            }

            function toggleFile(id) {
                setSelection((current) =>
                    current.includes(id)
                        ? current.filter((item) => item !== id)
                        : [...current, id]
                );
            }

            function selectGroup(ids) {
                setSelection((current) => Array.from(new Set([...current, ...ids])));
                setStatus({ message: "Title added to your playlist selection.", mode: "success" });
            }

            function removeGroup(ids) {
                setSelection((current) => current.filter((item) => !ids.includes(item)));
                setStatus({ message: "Title removed from your playlist selection.", mode: "success" });
            }

            function selectFilteredGroupFiles() {
                if (!activeFilteredIds.length) {
                    setStatus({ message: "No files matched this filter.", mode: "error" });
                    return;
                }
                setSelection((current) => Array.from(new Set([...current, ...activeFilteredIds])));
                setStatus({ message: `${activeFilteredIds.length} filtered files added to your playlist selection.`, mode: "success" });
            }

            function clearFilteredGroupFiles() {
                if (!activeFilteredIds.length) {
                    setStatus({ message: "No files matched this filter.", mode: "error" });
                    return;
                }
                setSelection((current) => current.filter((item) => !activeFilteredIds.includes(item)));
                setStatus({ message: "Filtered files removed from your playlist selection.", mode: "success" });
            }

            function selectPerEpisode(mode) {
                if (!activeBuckets.length) {
                    setStatus({ message: "No files matched this filter.", mode: "error" });
                    return;
                }
                const ids = activeBuckets
                    .map((bucket) => sortFilesForModal(bucket.files, mode === "largest" ? "size_desc" : "size_asc")[0]?.id)
                    .filter(Boolean);
                setSelection((current) => Array.from(new Set([...current.filter((item) => !activeFilteredIds.includes(item)), ...ids])));
                setStatus({
                    message: `${ids.length} ${mode === "largest" ? "largest" : "smallest"} variants selected, one per episode.`,
                    mode: "success",
                });
            }

            function pickBucketVariant(bucket, mode) {
                const target = sortFilesForModal(bucket.files, mode === "largest" ? "size_desc" : "size_asc")[0];
                if (!target) {
                    return;
                }
                setSelection((current) => Array.from(new Set([...current.filter((item) => !bucket.files.some((file) => file.id === item)), target.id])));
                setStatus({ message: `${bucket.label} set to the ${mode} release.`, mode: "success" });
            }

            function clearBucketSelection(bucket) {
                setSelection((current) => current.filter((item) => !bucket.files.some((file) => file.id === item)));
                setStatus({ message: `${bucket.label} cleared from the current selection.`, mode: "success" });
            }

            function toggleVisible() {
                const everySelected = visibleIds.length && visibleIds.every((id) => selection.includes(id));
                if (everySelected) {
                    setSelection((current) => current.filter((id) => !visibleIds.includes(id)));
                    setStatus({ message: isExplorerView ? "Visible files removed from selection." : "Visible titles removed from selection.", mode: "success" });
                } else {
                    setSelection((current) => Array.from(new Set([...current, ...visibleIds])));
                    setStatus({ message: isExplorerView ? "Visible files added to selection." : "Visible titles added to selection.", mode: "success" });
                }
            }

            function moveSelection(id, direction) {
                setSelection((current) => {
                    const index = current.indexOf(id);
                    if (index < 0) {
                        return current;
                    }
                    const targetIndex = index + direction;
                    if (targetIndex < 0 || targetIndex >= current.length) {
                        return current;
                    }
                    const next = [...current];
                    [next[index], next[targetIndex]] = [next[targetIndex], next[index]];
                    return next;
                });
            }

            async function createPlaylistForIds(fileIds, suggestedTitle = "") {
                if (!fileIds.length) {
                    setStatus({ message: "Select at least one file first.", mode: "error" });
                    return;
                }
                setPlaylistUrl("");
                setStatus({ message: "Creating playlist link...", mode: "" });
                try {
                    const response = await fetch(initialData.create_playlist_endpoint, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ title: suggestedTitle || playlistTitle, file_ids: fileIds }),
                    });
                    const payload = await response.json();
                    if (!response.ok || !payload.ok) {
                        throw new Error(payload.error || "Playlist creation failed.");
                    }
                    setPlaylistUrl(payload.playlist_url);
                    setStatus({ message: `Playlist ready with ${payload.count} files.`, mode: "success" });
                } catch (error) {
                    setStatus({ message: error.message || "Playlist creation failed.", mode: "error" });
                }
            }

            async function createPlaylist() {
                await createPlaylistForIds(selection, playlistTitle);
            }

            async function createTelegramBundleForIds(fileIds, suggestedTitle = "") {
                if (!fileIds.length) {
                    setStatus({ message: "Select at least one file first.", mode: "error" });
                    return;
                }
                setTelegramBundleUrl("");
                setStatus({ message: "Creating Telegram bundle link...", mode: "" });
                try {
                    const response = await fetch(initialData.create_tg_bundle_endpoint, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ title: suggestedTitle || playlistTitle, file_ids: fileIds }),
                    });
                    const payload = await response.json();
                    if (!response.ok || !payload.ok) {
                        throw new Error(payload.error || "Telegram bundle creation failed.");
                    }
                    setTelegramBundleUrl(payload.telegram_url);
                    setStatus({ message: `Telegram bundle ready with ${payload.count} files.`, mode: "success" });
                } catch (error) {
                    setStatus({ message: error.message || "Telegram bundle creation failed.", mode: "error" });
                }
            }

            async function createTelegramBundle() {
                await createTelegramBundleForIds(selection, playlistTitle);
            }

            async function startScan(fullRescan = false) {
                if (!scanChatId.trim()) {
                    setStatus({ message: "Enter a source chat ID first.", mode: "error" });
                    return;
                }
                setStatus({ message: fullRescan ? "Starting full history rescan..." : "Starting sync for new posts only...", mode: "" });
                try {
                    const response = await fetch(initialData.scan_start_endpoint, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ chat_id: scanChatId.trim(), full_rescan: fullRescan }),
                    });
                    const payload = await response.json();
                    if (!response.ok || !payload.ok) {
                        throw new Error(payload.error || "Scan could not be started.");
                    }
                    setScanStatus(payload.scan);
                    setStatus({
                        message: fullRescan
                            ? "Full rescan started. This will walk the whole chat history again."
                            : "Tracked source sync started. Only newer posts should be checked.",
                        mode: "success",
                    });
                } catch (error) {
                    setStatus({ message: error.message || "Scan could not be started.", mode: "error" });
                }
            }

            async function refreshScan() {
                try {
                    const response = await fetch(initialData.scan_status_endpoint);
                    const payload = await response.json();
                    if (payload.ok) {
                        setScanStatus(payload.scan);
                    }
                } catch (error) {
                    setStatus({ message: "Could not refresh scan status.", mode: "error" });
                }
            }

            async function copyText(value, message) {
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(value);
                        setStatus({ message, mode: "success" });
                        return;
                    }
                    if (copyTextFallback(value)) {
                        setStatus({ message, mode: "success" });
                        return;
                    }
                    throw new Error("Clipboard unavailable");
                } catch (error) {
                    setStatus({ message: "Clipboard copy failed on this device.", mode: "error" });
                }
            }

                try {
                    const response = await fetch(initialData.admin_users_endpoint);
                    const payload = await response.json();
                    if (response.ok && payload.ok) {
                        setAdminUsers(payload.users || []);
                    }
                } catch (error) {
                }
            }

                if (!newAdminUsername.trim() || !newAdminPassword) {
                    setStatus({ message: "Enter both username and password for the new website user.", mode: "error" });
                    return;

                try {
                    const response = await fetch(initialData.admin_users_endpoint, {

                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: newAdminUsername.trim(),
                            password: newAdminPassword,

                    });

                    if (!response.ok || !payload.ok) {
                        throw new Error(payload.error || "Could not create admin user.");

                    setNewAdminUsername("");

                    setStatus({ message: "Website user created successfully.", mode: "success" });

                    setStatus({ message: error.message || "Could not create admin user.", mode: "error" });

                    return;

                try {
                    const response = await fetch(`${initialData.admin_users_endpoint}/${encodeURIComponent(username)}`, {
                        method: "DELETE",

                    const payload = await response.json();
                    if (!response.ok || !payload.ok) {
                        throw new Error(payload.error || "Could not delete admin user.");
                    }
                    await refreshAdminUsers();
                    setStatus({ message: `Deleted website user ${username}.`, mode: "success" });
                } catch (error) {
                    setStatus({ message: error.message || "Could not delete admin user.", mode: "error" });

            async function searchFixMatches() {
                if (!activeGroup || !fixMatchQuery.trim()) {
                    setStatus({ message: "Enter a title to search first.", mode: "error" });
                    return;
                }
                setFixMatchLoading(true);
                try {
                    const params = new URLSearchParams({
                        q: fixMatchQuery.trim(),
                        kind: activeGroup.media_kind || "tv",
                    });
                    const response = await fetch(`${initialData.catalog_search_endpoint}?${params.toString()}`);
                    const payload = await response.json();
                    if (!response.ok || !payload.ok) {
                        throw new Error(payload.error || "Could not search TMDb.");
                    }
                    setFixMatchResults(payload.results || []);
                    setStatus({ message: `Found ${payload.results?.length || 0} match candidates.`, mode: "success" });
                } catch (error) {
                    setStatus({ message: error.message || "Could not search TMDb.", mode: "error" });
                } finally {
                    setFixMatchLoading(false);
                }
            }

            async function lookupFixMatchById() {
                if (!activeGroup || !fixMatchTmdbId.trim()) {
                    setStatus({ message: "Enter a TMDb ID first.", mode: "error" });
                    return;
                }
                setFixMatchLoading(true);
                try {
                    const params = new URLSearchParams({
                        id: fixMatchTmdbId.trim(),
                        kind: activeGroup.media_kind || "tv",
                    });
                    const response = await fetch(`${initialData.catalog_lookup_endpoint}?${params.toString()}`);
                    const payload = await response.json();
                    if (!response.ok || !payload.ok) {
                        throw new Error(payload.error || "Could not look up that TMDb ID.");
                    }
                    setFixMatchResults(payload.result ? [payload.result] : []);
                    setStatus({ message: "TMDb ID loaded. Review it and apply the lock if it is correct.", mode: "success" });
                } catch (error) {
                    setStatus({ message: error.message || "Could not look up that TMDb ID.", mode: "error" });
                } finally {
                    setFixMatchLoading(false);
                }
            }

            async function applyFixMatch(result) {
                if (!activeGroup) {
                    return;

                    const response = await fetch(initialData.catalog_override_endpoint, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },

                        throw new Error(payload.error || "Could not apply match.");

                    setStatus({ message: `Locked match for ${result.title}. Refresh the page to see the updated card.`, mode: "success" });
                    setFixMatchOpen(false);

                    setStatus({ message: error.message || "Could not apply match.", mode: "error" });
