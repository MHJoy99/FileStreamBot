                                        <div>
                                            <div className="section-kicker">Title Details</div>
                                            <h2 style={{ marginTop: 10 }}>{activeGroup.display_title}</h2>
                                            <p className="muted" style={{ marginTop: 10 }}>{activeGroup.overview || "This title has no TMDb overview yet, but the direct Telegram files are ready to use."}</p>
                                            <div className="hero-meta" style={{ marginTop: 14 }}>
                                                {activeGroup.release_year ? <span className="chip">{activeGroup.release_year}</span> : null}
                                                <span className="chip">{activeGroup.media_kind.toUpperCase()}</span>
                                                <span className="chip">{activeGroup.count} files</span>
                                                <span className="chip">{activeGroup.total_size}</span>
                                                <span className="chip">{activeSelectionCount} selected</span>
                                                <span className="chip">{formatLockMode(activeGroup.lock_mode, activeGroup.locked)}</span>
                                                {activeGroup.tmdb_id ? <span className="chip">TMDb {activeGroup.tmdb_id}</span> : null}
                                            </div>
                                            <div className="modal-actions" style={{ marginTop: 18 }}>
                                                <button className="button" type="button" onClick={() => selectGroup(activeGroup.files.map((file) => file.id))}>Select Full Title</button>
                                                <button className="ghost" type="button" onClick={() => createPlaylistForIds(activeSelectedIds, activeGroup.display_title)}>Create M3U From Selected ({activeSelectionCount})</button>
                                                <button className="ghost" type="button" onClick={() => createTelegramBundleForIds(activeSelectedIds, activeGroup.display_title)}>Get Selected in Telegram ({activeSelectionCount})</button>
                                                <button className="ghost" type="button" onClick={() => createPlaylistForIds(activeGroup.files.map((file) => file.id), activeGroup.display_title)}>Create M3U From Full Title ({activeGroup.files.length})</button>
                                                <button className="ghost" type="button" onClick={() => removeGroup(activeGroup.files.map((file) => file.id))}>Remove Title</button>
                                                <button className="ghost" type="button" onClick={() => setFixMatchOpen((current) => !current)}>Fix Match</button>
                                                <a className="ghost" href={activeGroup.files[0]?.download_url} target="_blank" rel="noopener">Open First Direct Link</a>
                                            </div>
                                            {fixMatchOpen ? (
                                                <div className="fix-match-panel">
                                                    <div className="section-kicker">Repair Match</div>
                                                    <p className="muted" style={{ marginTop: 0 }}>
                                                        Current source: {formatLockMode(activeGroup.lock_mode, activeGroup.locked)}
                                                        {activeGroup.tmdb_id ? ` · TMDb ${activeGroup.tmdb_id}` : ""}
                                                    </p>
                                                    <input value={fixMatchQuery} onChange={(event) => setFixMatchQuery(event.target.value)} placeholder="Search TMDb title" />
                                                    <input value={fixMatchTmdbId} onChange={(event) => setFixMatchTmdbId(event.target.value)} placeholder="Or paste exact TMDb ID" />
                                                    <div className="toolbar-actions">
                                                        <button className="button" type="button" onClick={searchFixMatches}>{fixMatchLoading ? "Searching..." : "Search TMDb"}</button>
                                                        <button className="ghost" type="button" onClick={lookupFixMatchById}>Lookup TMDb ID</button>
                                                        <button className="ghost" type="button" onClick={useFilenameOnly}>Lock To Filename</button>
                                                        {activeGroup.locked ? <button className="ghost" type="button" onClick={clearManualLock}>Clear Manual Lock</button> : null}
                                                    </div>
                                                    {fixMatchResults.length ? (
                                                        <div className="match-results">
                                                            {fixMatchResults.map((result, index) => (
                                                                <div className="match-result" key={`${result.tmdb_id || "raw"}-${index}`}>
                                                                    <strong>{result.title}{result.release_year ? ` (${result.release_year})` : ""}</strong>
                                                                    {result.tmdb_id ? <span>TMDb ID: {result.tmdb_id}</span> : null}
                                                                    <span>{result.overview || "No overview available."}</span>
                                                                    <div className="toolbar-actions" style={{ marginTop: 10 }}>
                                                                        <button className="tiny" type="button" onClick={() => applyFixMatch(result)}>Apply + Lock</button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    ) : (
                                                        <p className="muted">Search the correct TMDb title, paste an exact TMDb ID, or keep this group in filename-only mode. Locked mappings always win over auto-match until you clear them.</p>
                                                    )}
                                                </div>
                                            ) : null}
                                        </div>
                                    </div>
                                </div>

                                <div className="modal-content">
                                    <div className="section-kicker">Files</div>
                                    <h2 style={{ marginTop: 10 }}>Episodes and direct links</h2>
                                    <div className="modal-toolbar">
                                        <div className="inline-panel">
                                            <div className="section-kicker">Title Playlist</div>
                                            <p className="muted" style={{ marginTop: 8 }}>
                                                Select the exact episodes you want here, then generate the `.m3u` link without leaving this title view.
                                            </p>
                                            {playlistUrl ? (
                                                <input
                                                    className="copy-field"
                                                    readOnly
                                                    value={playlistUrl}
                                                    onFocus={(event) => event.target.select()}
                                                    style={{ marginTop: 12 }}
                                                />
                                            ) : null}
                                            <div className="toolbar-actions" style={{ marginTop: 12 }}>
                                                <button className="button" type="button" onClick={() => createPlaylistForIds(activeSelectedIds, activeGroup.display_title)}>Create M3U From Selected ({activeSelectionCount})</button>
                                                <button className="ghost" type="button" onClick={() => createTelegramBundleForIds(activeSelectedIds, activeGroup.display_title)}>Get Selected in Telegram ({activeSelectionCount})</button>
                                                <button className="ghost" type="button" onClick={() => createPlaylistForIds(activeGroup.files.map((file) => file.id), activeGroup.display_title)}>Whole Title M3U ({activeGroup.files.length})</button>
                                                {playlistUrl ? <button className="ghost" type="button" onClick={() => copyText(playlistUrl, "Playlist URL copied.")}>Copy Last M3U</button> : null}
                                                {playlistUrl ? <a className="ghost" href={playlistUrl} target="_blank" rel="noopener">Open Last M3U</a> : null}
                                            </div>
                                            {telegramBundleUrl ? (
                                                <input
                                                    className="copy-field"
                                                    readOnly
                                                    value={telegramBundleUrl}
                                                    onFocus={(event) => event.target.select()}
                                                    style={{ marginTop: 12 }}
                                                />
                                            ) : null}
                                            {telegramBundleUrl ? (
                                                <div className="toolbar-actions" style={{ marginTop: 10 }}>
                                                    <button className="ghost" type="button" onClick={() => copyText(telegramBundleUrl, "Telegram bundle link copied.")}>Copy Telegram Link</button>
                                                    <a className="ghost" href={telegramBundleUrl} target="_blank" rel="noopener">Open in Bot</a>
                                                </div>
                                            ) : null}
                                        </div>
                                        <div className="inline-panel filter-panel">
                                            <div className="section-kicker">Quick Quality Filter</div>
                                            <p className="muted" style={{ marginTop: 8 }}>
                                                Filter this title by release quality, then select or build one M3U just from that filtered set.
                                            </p>
                                            <div className="filter-chips">
                                                <button
                                                    className={`filter-chip ${activeQualityFilter === "all" ? "is-active" : ""}`}
                                                    type="button"
                                                    onClick={() => setActiveQualityFilter("all")}
                                                >
                                                    All Files
                                                    <span className="chip">{buildVariantBuckets(activeGroup.files).length} eps · {activeGroup.files.length} files</span>
                                                </button>
                                                {activeQualityOptions.map((quality) => {
                                                    const qualityFiles = activeGroup.files.filter((file) => detectQualityTag(file.name) === quality);
                                                    const episodeCount = buildVariantBuckets(qualityFiles).length;
                                                    return (
                                                        <button
                                                            key={quality}
                                                            className={`filter-chip ${activeQualityFilter === quality ? "is-active" : ""}`}
                                                            type="button"
                                                            onClick={() => setActiveQualityFilter(quality)}
                                                        >
                                                            {quality}
                                                            <span className="chip">{episodeCount} eps · {qualityFiles.length} files</span>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                            <div className="toolbar-actions">
                                                <span className="chip">{activeFilteredFiles.length} filtered files</span>
                                                <span className="chip">{activeBuckets.length} episode groups</span>
                                                <span className="chip">{activeFilteredSelectionCount} selected from filter</span>
                                                <select value={activeVariantSort} onChange={(event) => setActiveVariantSort(event.target.value)} style={{ width: "auto", minWidth: 180 }}>
                                                    <option value="episode">Episode Order</option>
                                                    <option value="size_desc">Largest First</option>
                                                    <option value="size_asc">Smallest First</option>
                                                    <option value="name">Filename A-Z</option>
                                                </select>
                                                <button className="ghost" type="button" onClick={() => selectPerEpisode("largest")}>Pick Largest Per Episode</button>
                                                <button className="ghost" type="button" onClick={() => selectPerEpisode("smallest")}>Pick Smallest Per Episode</button>
                                                {activeFilteredSelectionCount ? (
                                                    <button className="button" type="button" onClick={() => createPlaylistForIds(activeFilteredSelectedIds, `${activeGroup.display_title} ${activeQualityFilter === "all" ? "Selected Files" : `${activeQualityFilter} Selected`}`)}>
                                                        M3U From Selected Filter ({activeFilteredSelectionCount})
                                                    </button>
                                                ) : null}
                                                {activeFilteredSelectionCount ? (
                                                    <button className="ghost" type="button" onClick={() => createTelegramBundleForIds(activeFilteredSelectedIds, `${activeGroup.display_title} ${activeQualityFilter === "all" ? "Selected Files" : `${activeQualityFilter} Selected`}`)}>
                                                        Telegram From Selected ({activeFilteredSelectionCount})
                                                    </button>
                                                ) : null}
                                                <button className={activeFilteredSelectionCount ? "ghost" : "button"} type="button" onClick={() => createPlaylistForIds(activeFilteredIds, `${activeGroup.display_title} ${activeQualityFilter === "all" ? "All Files" : activeQualityFilter}`)}>
                                                    {activeQualityFilter === "all"
                                                        ? `M3U From All ${activeFilteredIds.length} Files`
                                                        : `M3U From ${activeQualityFilter} (${activeFilteredIds.length})`}
                                                </button>
                                                <button className="ghost" type="button" onClick={() => createTelegramBundleForIds(activeFilteredIds, `${activeGroup.display_title} ${activeQualityFilter === "all" ? "All Files" : activeQualityFilter}`)}>
                                                    {activeQualityFilter === "all"
                                                        ? `Telegram From All ${activeFilteredIds.length} Files`
                                                        : `Telegram From ${activeQualityFilter} (${activeFilteredIds.length})`}
                                                </button>
                                                <button className="ghost" type="button" onClick={selectFilteredGroupFiles}>Select Filtered</button>
                                                <button className="ghost" type="button" onClick={clearFilteredGroupFiles}>Clear Filtered</button>
                                            </div>
                                            {activeFilteredSelectionCount && activeFilteredIds.length !== activeFilteredSelectionCount ? (
                                                <p className="muted" style={{ marginTop: 10 }}>
                                                    The checked-file playlist uses only your {activeFilteredSelectionCount} selected files. The other filter button includes all {activeFilteredIds.length} files in the current filter.
                                                </p>
                                            ) : null}
                                        </div>
                                    </div>
                                    <div className="files-grid">
                                        {activeBuckets.map((bucket) => (
                                            <React.Fragment key={bucket.key}>
                                                {bucket.files.length > 1 ? (
                                                    <div className="inline-panel">
                                                        <div className="section-kicker">Variant Group</div>
                                                        <p className="muted" style={{ marginTop: 8 }}>
                                                            {bucket.label} has {bucket.files.length} variants. Pick the exact release you want in the playlist.
                                                        </p>
                                                        <div className="toolbar-actions" style={{ marginTop: 10 }}>
                                                            <button className="ghost" type="button" onClick={() => pickBucketVariant(bucket, "largest")}>Pick Largest</button>
                                                            <button className="ghost" type="button" onClick={() => pickBucketVariant(bucket, "smallest")}>Pick Smallest</button>
                                                            <button className="ghost" type="button" onClick={() => clearBucketSelection(bucket)}>Clear Episode</button>
                                                        </div>
                                                    </div>
                                                ) : null}
                                                {bucket.files.map((file) => (
                                                    <div className="file-row" key={file.id}>
                                                        <input className="checkbox" type="checkbox" checked={hasSelected(file.id)} onChange={() => toggleFile(file.id)} />
                                                        <div className="file-copy">
                                                            <strong>{formatEpisodeLabel(file)}</strong>
                                                            <span>{file.name}</span>
                                                        </div>
                                                        <div className="file-actions">
                                                            {extractReleaseTags(file.name).map((tag) => <span className="chip" key={`${file.id}-${tag}`}>{tag}</span>)}
                                                            <span className="chip">{detectQualityTag(file.name)}</span>
                                                            <span className="chip">{file.size}</span>
                                                            <a className="tiny" href={file.download_url} target="_blank" rel="noopener">Direct Link</a>
                                                            <a className="tiny" href={file.watch_url} target="_blank" rel="noopener">Watch Page</a>
                                                        </div>
                                                    </div>
                                                ))}
                                            </React.Fragment>
                                        ))}
                                        {!activeBuckets.length ? (
                                            <div className="empty-state">No files matched this quality filter inside the title.</div>
                                        ) : null}
                                    </div>
                                </div>
                            </div>
                        </div>
                    ) : null}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
        {% endraw %}
    </script>
</body>
</html>
